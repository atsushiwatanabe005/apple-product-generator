<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fake Apple Product Generator</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
text-align:center;
background:white;
margin:0;
padding-top:120px;
}

.introducing{
font-size:5vw;
color:#6e6e73;
margin-bottom:20px;
}

#result{
font-size:10vw;
font-weight:600;
margin:30px;
opacity:0;
transform:translateY(20px);
transition:all 0.4s ease;
line-height:1.1;
}

.show{
opacity:1 !important;
transform:translateY(0) !important;
}

.buttons{
display:flex;
flex-direction:column;
align-items:center;
gap:16px;
margin-top:40px;
}

button{
font-size:20px;
padding:16px 36px;
border-radius:40px;
border:none;
background:black;
color:white;
cursor:pointer;
width:220px;
}

button:hover{
opacity:0.8;
}

.share{
background:#1d9bf0;
}

</style>
</head>

<body>

<div class="introducing">Introducing</div>

<div id="result">Fake Apple Product</div>

<div class="buttons">

<button onclick="generate()">Generate</button>

<button class="share" onclick="share()">Share</button>

</div>

<script>

const products = [

"iPhone",
"MacBook",
"MacBook Pro",
"Mac mini",
"Mac Studio",
"Mac Pro",
"iMac",
"iPad",
"iPad Pro",
"Apple Watch",
"HomePod",
"AirPods",
"AirPods Pro",
"Vision",

"Apple Pencil",
"Magic Mouse",
"Magic Keyboard",
"Magic Trackpad",
"Pro Display XDR",
"Apple TV",
"MagSafe Charger",
"Polishing Cloth"

];

const modifiers = [

"nano",
"mini",
"air",
"pro",
"pro max",
"ultra",
"shuffle",
"studio",
"max",
"plus",
"SE",

"XDR",
"Titanium"

];

let currentProduct="";

function generate(){

const product = products[Math.floor(Math.random()*products.length)];
const modifier = modifiers[Math.floor(Math.random()*modifiers.length)];

currentProduct = product + " " + modifier;

const result = document.getElementById("result");

result.classList.remove("show");

setTimeout(()=>{
result.innerText=currentProduct;
result.classList.add("show");
},100);

}

function share(){

if(currentProduct==="") return;

const text = "Introducing " + currentProduct;

const url = "https://twitter.com/intent/tweet?text="+encodeURIComponent(text);

window.open(url);

}

</script>

</body>
</html>
