<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fake Apple Product Generator</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
background:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
max-width:800px;
padding:40px;
}

.introducing{
font-size:clamp(18px,3vw,28px);
color:#6e6e73;
margin-bottom:20px;
}

#result{
font-size:clamp(42px,9vw,90px);
font-weight:600;
line-height:1.05;
margin:30px 0;

min-height:2.4em;

display:flex;
align-items:center;
justify-content:center;

opacity:0;
transform:translateY(20px);
transition:all 0.4s ease;
}

.show{
opacity:1 !important;
transform:translateY(0) !important;
}

.buttons{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
margin-top:30px;
}

.generate{
font-size:20px;
padding:16px 42px;
border-radius:40px;
border:none;
background:black;
color:white;
cursor:pointer;
}

.generate:hover{
opacity:0.85;
}

.share{
font-size:14px;
padding:10px 20px;
border-radius:30px;
border:1px solid #d2d2d7;
background:white;
color:#1d1d1f;
cursor:pointer;
}

.share:hover{
background:#f5f5f7;
}

</style>
</head>

<body>

<div class="container">

<div class="introducing">Introducing</div>

<div id="result">Fake Apple Product</div>

<div class="buttons">

<button class="generate" onclick="generate()">Generate</button>

<button class="share" onclick="share()">Share</button>

</div>

</div>

<script>

const products = [

"iPhone",
"MacBook",
"MacBook Pro",
"Mac mini",
"Mac Studio",
"Mac Pro",
"iMac",
"iPad",
"iPad Pro",
"Apple Watch",
"HomePod",
"AirPods",
"AirPods Pro",
"Vision",

"Apple Pencil",
"Magic Mouse",
"Magic Keyboard",
"Magic Trackpad",
"Pro Display XDR",
"Apple TV",
"MagSafe Charger",
"AirMac Time Capsule",
"Polishing Cloth"

];

const modifiers = [

"nano",
"mini",
"air",
"pro",
"pro max",
"ultra",
"shuffle",
"studio",
"max",
"plus",
"SE",

"XDR",
"Neo",
"Titanium"

];

let currentProduct="";

function generate(){

const product = products[Math.floor(Math.random()*products.length)];
const modifier = modifiers[Math.floor(Math.random()*modifiers.length)];

currentProduct = product + " " + modifier;

const result = document.getElementById("result");

result.classList.remove("show");

setTimeout(()=>{
result.innerText=currentProduct;
result.classList.add("show");
},100);

}

function share(){

if(currentProduct==="") return;

const text = "Introducing " + currentProduct;

const url = "https://twitter.com/intent/tweet?text="+encodeURIComponent(text);

window.open(url);

}

</script>

</body>
</html>
